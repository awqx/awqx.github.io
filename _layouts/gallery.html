---
layout: default
---
{{ content }}
		
{% assign gllry = site.html_pages | sort:"gallery" | reverse %}
{% for item in gllry %}
  {% if item.src and item.gallery %}
	<div style="width: 100%; display: flex;">
		<div style="width: 50%; height: 100%">
		  <img src="{{ item.src }}" width=95%>
		</div>
		<div style="flex: 1; min-width: 0;">
		  <p>
		  <strong>{{ item.title }}</strong> ({{ item.year }})
		  <br>
		  {{ item.desc }}
		  </p>
		</div>
	</div>
  {% endif %}
{% endfor %}
